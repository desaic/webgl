<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logic Graph Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #111; font-family: sans-serif; }

    #controls {
      position: absolute; top: 16px; left: 16px; z-index: 10;
      display: flex; gap: 8px; align-items: center;
    }
    #status {
      position: absolute; top: 16px; right: 340px; z-index: 10;
      color: #aaa; font-size: 13px;
    }
    input[type="file"] { display: none; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 4px;
      background: #2563eb; color: white; cursor: pointer; font-size: 14px;
    }
    .btn:hover { background: #1d4ed8; }

    /* Chat sidebar */
    #chat-panel {
      position: absolute; top: 0; right: 0; width: 320px; height: 100vh;
      background: #1a1a2e; color: #e0e0e0;
      display: flex; flex-direction: column;
      border-left: 1px solid #333;
      z-index: 20;
      transition: transform 0.2s;
    }
    #chat-panel.collapsed {
      transform: translateX(290px);
    }
    #chat-panel.collapsed #chat-messages,
    #chat-panel.collapsed #chat-input-row { display: none; }
    #chat-header {
      padding: 12px 16px; background: #16213e;
      display: flex; justify-content: space-between; align-items: center;
      font-weight: bold; font-size: 14px;
    }
    #chat-toggle {
      background: none; border: 1px solid #444; color: #aaa;
      padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 14px;
    }
    #chat-messages {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .chat-msg {
      max-width: 90%; padding: 8px 12px; border-radius: 6px;
      font-size: 13px; line-height: 1.4; white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-user {
      align-self: flex-end; background: #2563eb; color: white;
    }
    .chat-engine {
      align-self: flex-start; background: #2d2d3f; color: #ccc;
    }
    #chat-input-row {
      display: flex; padding: 8px 12px; gap: 8px;
      border-top: 1px solid #333;
    }
    #chat-input {
      flex: 1; padding: 8px 12px; border-radius: 4px;
      border: 1px solid #444; background: #2d2d3f; color: #e0e0e0;
      font-size: 13px; outline: none;
    }
    #chat-send {
      padding: 8px 14px; border: none; border-radius: 4px;
      background: #2563eb; color: white; cursor: pointer; font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="controls">
    <label class="btn" for="upload">Upload JSON</label>
    <input type="file" id="upload" accept=".json" />
  </div>
  <div id="status">No graph loaded</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
