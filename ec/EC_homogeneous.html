<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Morphing Algebraic Surfaces with Z=1 Curve</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
    canvas { display: block; }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(0,0,0,0.8);
      padding: 10px 15px;
      border-radius: 6px;
      color: #fff;
    }
    select {
      background: #222;
      color: #fff;
      border: 1px solid #555;
      padding: 5px 10px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="ui">
  <label for="surfaceSelect">Show Surface: </label>
  <select id="surfaceSelect">
    <option value="morph">Morph Animation + Z=1 Curve</option>
    <option value="surf1">Surface 1 (Cyan: x³ + y³ = z³)</option>
    <option value="surf2">Surface 2 (Orange: y²z = x³ - 432z³)</option>
    <option value="both">Both Static Surfaces</option>
  </select>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(5, 5, 5);
   camera.up.set(0,0,1);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  scene.add(new THREE.AxesHelper(3));

  const N = 100;
  const geometry1 = new THREE.PlaneGeometry(4, 4, N, N);
  const vertexCount = geometry1.attributes.position.count;

  const pos1 = new Float32Array(vertexCount * 3);
  const pos2 = new Float32Array(vertexCount * 3);

  // Surface vertex grids
  const basePos = geometry1.attributes.position;
  for (let i = 0; i < vertexCount; i++) {
    const u = basePos.getX(i);
    const v = basePos.getY(i);

    // Surface 1
    pos1[i * 3 + 0] = u;
    pos1[i * 3 + 1] = v;
    pos1[i * 3 + 2] = Math.cbrt(Math.pow(u, 3) + Math.pow(v, 3));

    // Surface 2
    const y_s2 = u * 12.5;
    const z_s2 = v;
    const x_s2 = Math.cbrt(y_s2 * y_s2 * z_s2 + 432 * Math.pow(z_s2, 3));

    pos2[i * 3 + 0] = x_s2 * 0.15;
    pos2[i * 3 + 1] = y_s2 * 0.15;
    pos2[i * 3 + 2] = z_s2;
  }

  // Static Mesh 1 & 2
  const geo1 = geometry1.clone();
  for (let i = 0; i < vertexCount; i++) geo1.attributes.position.setXYZ(i, pos1[i*3], pos1[i*3+1], pos1[i*3+2]);
  const mesh1 = new THREE.Mesh(geo1, new THREE.MeshBasicMaterial({ color: 0x00ffcc, wireframe: true, side: THREE.DoubleSide }));

  const geo2 = geometry1.clone();
  for (let i = 0; i < vertexCount; i++) geo2.attributes.position.setXYZ(i, pos2[i*3], pos2[i*3+1], pos2[i*3+2]);
  const mesh2 = new THREE.Mesh(geo2, new THREE.MeshBasicMaterial({ color: 0xffaa00, wireframe: true, side: THREE.DoubleSide }));

  // Morphing Mesh
  const morphGeo = geometry1.clone();
  const morphMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, wireframe: true, side: THREE.DoubleSide });
  const morphMesh = new THREE.Mesh(morphGeo, morphMat);

  scene.add(mesh1, mesh2, morphMesh);

  // --- THICK CURVE AT Z = 1 CALCULATIONS ---
  const NUM_CURVE_PTS = 120;

  function getCurve1Point(u) {
    return new THREE.Vector3(u, Math.cbrt(1 - Math.pow(u, 3)), 1);
  }

  function getCurve2Point(u) {
    const y_s2 = u * 12.5;
    const x_s2 = Math.cbrt(y_s2 * y_s2 + 432);
    return new THREE.Vector3(x_s2 * 0.15, y_s2 * 0.15, 1);
  }

  function createStaticTube(getPointFn) {
    const pts = [];
    for (let i = 0; i < NUM_CURVE_PTS; i++) {
      const u = -2 + (i / (NUM_CURVE_PTS - 1)) * 4;
      pts.push(getPointFn(u));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    return new THREE.Mesh(
      new THREE.TubeGeometry(curve, 100, 0.04, 8, false),
      new THREE.MeshBasicMaterial({ color: 0xff0055 })
    );
  }

  const tube1 = createStaticTube(getCurve1Point);
  const tube2 = createStaticTube(getCurve2Point);
  scene.add(tube1, tube2);

  // Dynamic Morphing Tube
  const morphTubeMesh = new THREE.Mesh(
    new THREE.BufferGeometry(),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  scene.add(morphTubeMesh);

  function updateMorphTube(t) {
    const pts = [];
    for (let i = 0; i < NUM_CURVE_PTS; i++) {
      const u = -2 + (i / (NUM_CURVE_PTS - 1)) * 4;
      const p1 = getCurve1Point(u);
      const p2 = getCurve2Point(u);

      pts.push(new THREE.Vector3(
        (1 - t) * p2.x + t * p1.x,
        (1 - t) * p2.y + t * p1.y,
        1
      ));
    }
    const curve = new THREE.CatmullRomCurve3(pts);
    if (morphTubeMesh.geometry) morphTubeMesh.geometry.dispose();
    morphTubeMesh.geometry = new THREE.TubeGeometry(curve, 100, 0.04, 8, false);
  }

  // UI Selection State
  const select = document.getElementById('surfaceSelect');
  function updateVisibility() {
    const mode = select.value;
    mesh1.visible = (mode === 'surf1' || mode === 'both');
    tube1.visible = (mode === 'surf1' || mode === 'both');

    mesh2.visible = (mode === 'surf2' || mode === 'both');
    tube2.visible = (mode === 'surf2' || mode === 'both');

    morphMesh.visible = (mode === 'morph');
    morphTubeMesh.visible = (mode === 'morph');
  }
  select.addEventListener('change', updateVisibility);
  updateVisibility();

  // Animation Loop
  function animate(time) {
    requestAnimationFrame(animate);

    if (select.value === 'morph') {
      const t = (Math.sin(time * 0.0015) + 1) / 2;
      const positions = morphGeo.attributes.position.array;

      for (let i = 0; i < vertexCount * 3; i++) {
        positions[i] = (1 - t) * pos2[i] + t * pos1[i];
      }
      morphGeo.attributes.position.needsUpdate = true;
      morphMat.color.setHSL(0.08 + t * 0.4, 1.0, 0.5);

      updateMorphTube(t);
    }

    controls.update();
    renderer.render(scene, camera);
  }
  animate(0);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
